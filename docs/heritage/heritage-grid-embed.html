<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heritage Grid — Perego Cars</title>
    <style>
    :root {
        --color-primary: #FF4605;
        --color-primary-light: #FF6B35;
        --color-primary-10: rgba(255, 70, 5, 0.1);
        --color-text-primary: #1A1A1A;
        --color-text-muted: #666666;
        --color-surface: #FFFFFF;
        --color-background: #FAFBFC;
        --color-border: #E5E7EB;
        --shadow-md: 0 8px 30px rgba(0,0,0,0.10);
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        --radius-lg: 1rem;
        --transition-base: 300ms ease;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--color-text-primary); background: transparent; line-height: 1.6; }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }

    /* Filters */
    .hg-filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 0.5rem; padding: 0.5rem 1.5rem 1.5rem; max-width: 900px; margin: 0 auto; }
    .hg-filter { background: var(--color-surface); border: 1px solid var(--color-border); color: var(--color-text-muted); font-size: 0.75rem; font-weight: 600; padding: 0.45rem 1rem; border-radius: 50px; cursor: pointer; transition: var(--transition-base); text-transform: uppercase; letter-spacing: 1px; }
    .hg-filter:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .hg-filter.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

    /* Grid */
    .hg-grid { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 2rem; display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; }
    .hg-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; transition: var(--transition-base); display: block; }
    .hg-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-md); }
    .hg-card.hidden { display: none; }
    .hg-card-img { position: relative; aspect-ratio: 16/10; overflow: hidden; }
    .hg-card-img img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
    .hg-card:hover .hg-card-img img { transform: scale(1.05); }
    .hg-card-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(transparent, rgba(0,0,0,0.4)); pointer-events: none; }
    .hg-card-badge { position: absolute; top: 0.75rem; left: 0.75rem; background: rgba(0,0,0,0.7); color: #fff; font-size: 0.6rem; font-weight: 700; padding: 0.25rem 0.7rem; border-radius: 50px; text-transform: uppercase; letter-spacing: 1.5px; backdrop-filter: blur(8px); }
    .hg-card-badge--ferrari { background: rgba(200,0,0,0.85); }
    .hg-card-badge--porsche { background: rgba(0,0,0,0.85); }
    .hg-card-badge--lamborghini { background: rgba(180,150,0,0.85); }
    .hg-card-body { padding: 1rem 1.2rem; }
    .hg-card-title { font-size: 1rem; font-weight: 700; margin-bottom: 0.2rem; }
    .hg-card-specs { font-size: 0.8rem; color: var(--color-primary); font-weight: 500; }

    /* Counter */
    .hg-count { text-align: center; padding: 0 1.5rem 1rem; font-size: 0.8rem; color: var(--color-text-muted); }

    @media (max-width: 768px) {
        .hg-grid { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
        .hg-filter { font-size: 0.65rem; padding: 0.35rem 0.8rem; }
    }
    @media (max-width: 480px) {
        .hg-grid { grid-template-columns: 1fr; }
    }
    </style>
</head>
<body>

    <div class="hg-filters">
        <button class="hg-filter active" data-filter="all">Tous</button>
        <button class="hg-filter" data-filter="icones">Icones</button>
        <button class="hg-filter" data-filter="ferrari">Ferrari</button>
        <button class="hg-filter" data-filter="porsche">Porsche</button>
        <button class="hg-filter" data-filter="lamborghini">Lamborghini</button>
        <button class="hg-filter" data-filter="classiques">Classiques</button>
        <button class="hg-filter" data-filter="swiss-stories">Swiss Stories</button>
        <button class="hg-filter" data-filter="autres">Autres</button>
    </div>

    <div class="hg-count" id="hg-count"></div>

    <div class="hg-grid" id="hg-grid"></div>

    <script>
    (function() {
        var BASE = 'https://peregocars.github.io/inventory/heritage/';

        fetch(BASE + 'heritage.json')
            .then(function(r) { return r.json(); })
            .then(function(data) {
                var grid = document.getElementById('hg-grid');
                var cars = data.cars;

                cars.forEach(function(car) {
                    var brandLower = car.brand.toLowerCase();
                    var badgeClass = '';
                    if (brandLower === 'ferrari') badgeClass = ' hg-card-badge--ferrari';
                    else if (brandLower === 'porsche') badgeClass = ' hg-card-badge--porsche';
                    else if (brandLower === 'lamborghini') badgeClass = ' hg-card-badge--lamborghini';

                    var card = document.createElement('a');
                    card.href = car.detail_url;
                    card.target = '_blank';
                    card.className = 'hg-card';
                    card.setAttribute('data-categories', car.categories.join(','));
                    card.innerHTML =
                        '<div class="hg-card-img">' +
                            '<img src="' + car.image + '" alt="' + car.brand + ' ' + car.model + '" loading="lazy">' +
                            '<span class="hg-card-badge' + badgeClass + '">' + car.brand + '</span>' +
                            '<div class="hg-card-overlay"></div>' +
                        '</div>' +
                        '<div class="hg-card-body">' +
                            '<h3 class="hg-card-title">' + car.brand + ' ' + car.model + '</h3>' +
                            '<p class="hg-card-specs">' + car.specs + '</p>' +
                        '</div>';
                    grid.appendChild(card);
                });

                updateCount('all');

                // Filters
                document.querySelectorAll('.hg-filter').forEach(function(btn) {
                    btn.addEventListener('click', function() {
                        document.querySelectorAll('.hg-filter').forEach(function(b) { b.classList.remove('active'); });
                        btn.classList.add('active');
                        var filter = btn.getAttribute('data-filter');
                        document.querySelectorAll('.hg-card').forEach(function(card) {
                            if (filter === 'all') {
                                card.classList.remove('hidden');
                            } else {
                                var cats = card.getAttribute('data-categories');
                                card.classList.toggle('hidden', cats.indexOf(filter) === -1);
                            }
                        });
                        updateCount(filter);
                        notifyHeight();
                    });
                });

                notifyHeight();
            });

        function updateCount(filter) {
            var visible = document.querySelectorAll('.hg-card:not(.hidden)').length;
            document.getElementById('hg-count').textContent = visible + ' vehicule' + (visible > 1 ? 's' : '');
        }

        function notifyHeight() {
            setTimeout(function() {
                var h = document.documentElement.scrollHeight;
                window.parent.postMessage({ type: 'perego-heritage-height', height: h }, '*');
            }, 100);
        }

        if (window.ResizeObserver) {
            new ResizeObserver(function() { notifyHeight(); }).observe(document.body);
        }
    })();
    </script>

</body>
</html>
