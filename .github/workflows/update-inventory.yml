name: Update Perego Cars Inventory

on:
  schedule:
    - cron: '0 8 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run inventory scraper
        working-directory: tool
        run: python scrape.py --force

      - name: Check for changes
        id: changes
        run: |
          git add -A docs/
          git add custom.json || true
          if git diff --staged --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "Perego Cars Bot"
          git config user.email "bot@peregocars.com"
          git add -A docs/
          git add custom.json || true
          git commit -m "Update inventory $(date +%Y-%m-%d)"
          git fetch origin main
          git pull --rebase origin main
          git push origin main
