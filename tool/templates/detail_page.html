<!-- Perego Cars — {{make}} {{model}} — Auto-generated -->
<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{make}} {{model}} | Perego Cars</title>
    <meta name="description" content="{{make}} {{model}} {{year}} — {{mileage_fmt}} km — {{price_fmt}}. En vente chez Perego Cars, Etoy, Suisse.">
    <style>
    :root {
        --color-primary: #FF4605;
        --color-primary-light: #FF6B35;
        --color-text-primary: #1A1A1A;
        --color-text-muted: #666666;
        --color-surface: #FFFFFF;
        --color-background: #FAFBFC;
        --color-border: #E5E7EB;
        --font-body: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        --radius-sm: 0.5rem;
        --radius-md: 0.75rem;
        --radius-lg: 1rem;
    }
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: var(--font-body); color: var(--color-text-primary); background: var(--color-background); }
    img { max-width: 100%; height: auto; display: block; }
    a { color: inherit; text-decoration: none; }

    .pcd-container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* Back link */
    .pcd-back {
        display: inline-flex; align-items: center; gap: 0.4rem;
        color: var(--color-primary); font-size: 0.85rem; font-weight: 600;
        margin-bottom: 1.5rem;
    }
    .pcd-back:hover { text-decoration: underline; }

    /* Gallery */
    .pcd-gallery-main {
        width: 100%; aspect-ratio: 16/9; object-fit: cover;
        border-radius: var(--radius-lg); margin-bottom: 0.75rem;
    }
    .pcd-thumbs {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
        gap: 0.5rem; margin-bottom: 2rem;
    }
    .pcd-thumb {
        width: 100%; aspect-ratio: 4/3; object-fit: cover;
        border-radius: var(--radius-sm); border: 2px solid var(--color-border);
        cursor: pointer; transition: border-color 0.2s, opacity 0.2s; opacity: 0.7;
    }
    .pcd-thumb:hover { border-color: var(--color-primary); opacity: 1; }
    .pcd-thumb.active { border-color: var(--color-primary); opacity: 1; }

    /* Header */
    .pcd-brand {
        font-size: 0.75rem; letter-spacing: 2px; color: var(--color-primary);
        text-transform: uppercase; font-weight: 600; margin-bottom: 0.3rem;
    }
    .pcd-model { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; line-height: 1.2; }
    .pcd-price { font-size: 1.8rem; font-weight: 700; color: var(--color-primary); margin-bottom: 2rem; }

    /* Specs */
    .pcd-specs { margin-bottom: 2rem; }
    .pcd-specs-title {
        font-size: 1.1rem; font-weight: 700; margin-bottom: 1rem;
        padding-bottom: 0.75rem; border-bottom: 2px solid var(--color-primary);
    }
    .pcd-spec-row {
        display: flex; justify-content: space-between; align-items: center;
        padding: 0.75rem 0; border-bottom: 1px solid var(--color-border);
    }
    .pcd-spec-label { color: var(--color-text-muted); font-size: 0.88rem; }
    .pcd-spec-value { font-weight: 600; font-size: 0.88rem; }

    /* WhatsApp CTA */
    .pcd-cta-wa {
        display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        width: 100%; padding: 1rem; background: #25D366; color: #fff;
        border-radius: var(--radius-md); font-weight: 700; font-size: 1rem;
        text-decoration: none; margin-top: 2rem; transition: background 0.2s;
    }
    .pcd-cta-wa:hover { background: #1ebe5d; }

    /* AutoScout link */
    .pcd-as-link {
        display: block; text-align: center; margin-top: 1rem;
        color: var(--color-text-muted); font-size: 0.82rem;
    }
    .pcd-as-link:hover { color: var(--color-primary); }

    /* Teaser */
    .pcd-teaser {
        margin-top: 2rem; padding: 1.5rem; background: var(--color-surface);
        border: 1px solid var(--color-border); border-radius: var(--radius-md);
        font-size: 0.92rem; line-height: 1.7; color: var(--color-text-muted);
    }

    /* Description */
    .pcd-description { margin-top: 2rem; }
    .pcd-desc-text { font-size: 0.92rem; line-height: 1.7; color: var(--color-text-muted); white-space: pre-line; }

    /* Service history */
    .pcd-service { margin-top: 2rem; }
    .pcd-sh-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .pcd-sh-table th { text-align: left; padding: 0.75rem 0; border-bottom: 2px solid var(--color-border); color: var(--color-text-muted); font-weight: 600; }
    .pcd-sh-table td { padding: 0.75rem 0; border-bottom: 1px solid var(--color-border); }
    .pcd-sh-date { white-space: nowrap; padding-right: 2rem; color: var(--color-text-muted); }

    /* YouTube videos */
    .pcd-videos { margin-top: 2rem; }
    .pcd-video-wrap { position: relative; padding-bottom: 56.25%; margin-top: 1rem; border-radius: var(--radius-md); overflow: hidden; }
    .pcd-video-wrap iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }

    @media (max-width: 640px) {
        .pcd-model { font-size: 1.5rem; }
        .pcd-price { font-size: 1.4rem; }
        .pcd-thumbs { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
    }
    </style>
</head>
<body>

        <a href="{{listing_url}}" target="_blank" rel="noopener noreferrer" class="pcd-as-link">

        </a>

        {{teaser_block}}
    </div>
    <script>
    (function() {
        var main = document.querySelector('.pcd-gallery-main');
        var thumbs = document.querySelectorAll('.pcd-thumb');
        thumbs.forEach(function(t) {
            t.addEventListener('click', function() {
                main.src = this.src;
                thumbs.forEach(function(x) { x.classList.remove('active'); });
                this.classList.add('active');
            });
        });
    })();
    </script>
</body>
</html>
